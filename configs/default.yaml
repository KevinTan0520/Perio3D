seed: 42
paths:
  dataset_root: dataset
  processed_root: data/processed
  reports_root: outputs/reports
  splits_root: data/splits
data:
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tif", ".tiff", ".webp"]
  ignored_name_prefixes: ["._"]
  ignored_exact_names: [".DS_Store"]
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
tracking:
  backend: mlflow
segmentation:
  classes:
    background: 0
    tooth: 1
    gingiva: 2
  annotation_queue: outputs/seg/annotation_queue.csv
  annotation_schema: outputs/seg/annotation_schema.json
  mask_dir: outputs/seg/masks
  pred_manifest: outputs/seg/pred_manifest.csv
  metrics: outputs/seg/metrics.json
  baseline_model: pillow_numpy_color_baseline_v1
  resize_long_edge: 1600
